---
app-id: com.omnissa.HorizonClient
runtime: org.gnome.Platform
runtime-version: '50'
sdk: org.gnome.Sdk
command: horizon-client-next
x-flatpak-builder-version: "1.4.8"
build-options:
  env:
    TERM: dumb
    VMWARE_EULAS_AGREED: yes
finish-args:
  - --share=network
  - --share=ipc
  - --socket=x11
  - --socket=pulseaudio
  - --device=dri
  - --env=GTK_THEME=Adwaita
  - --env=GTK_MODULES=
  - --env=GDK_BACKEND=x11
  - --env=GDK_SCALE=1
  - --env=GDK_DPI_SCALE=1
  - --device=all
  - --persist=.omnissa
  - --filesystem=xdg-public-share
  - --filesystem=xdg-data:ro

modules:
  - name: libudev1
    buildsystem: autotools
    sources:
      - type: archive
        url: https://github.com/gentoo/eudev/archive/v3.2.11.tar.gz
        sha256: dcfc482099f3fdfcfdb9aeabbc4d609877cf4d2d0407f50ab0c59d43fff44f92

  - name: libxml2
    buildsystem: autotools
    config-opts:
      - --without-python
      - --without-icu
    sources:
      - type: archive
        url: https://download.gnome.org/sources/libxml2/2.11/libxml2-2.11.9.tar.xz
        sha256: 780157a1efdb57188ec474dca87acaee67a3a839c2525b2214d318228451809f

  - name: libsigc++
    buildsystem: meson
    config-opts:
      - -Dbuild-examples=false
      - -Dbuild-documentation=false
      - --libdir=lib
    sources:
      - type: archive
        url: https://download.gnome.org/sources/libsigc++/2.10/libsigc++-2.10.8.tar.xz
        sha256: 235a40bec7346c7b82b6a8caae0456353dc06e71f14bc414bcc858af1838719a

  - name: glibmm
    buildsystem: meson
    config-opts:
      - -Dbuild-examples=false
      - -Dbuild-documentation=false
      - --libdir=lib
    sources:
      - type: archive
        url: https://download.gnome.org/sources/glibmm/2.66/glibmm-2.66.7.tar.xz
        sha256: fe02c1e5f5825940d82b56b6ec31a12c06c05c1583cfe62f934d0763e1e542b3

  - name: cairomm
    buildsystem: meson
    config-opts:
      - -Dbuild-examples=false
      - -Dbuild-documentation=false
      - -Dbuild-tests=false
      - --libdir=lib
    sources:
      - type: archive
        url: https://www.cairographics.org/releases/cairomm-1.14.5.tar.xz
        sha256: 70136203540c884e89ce1c9edfb6369b9953937f6cd596d97c78c9758a5d48db

  - name: pangomm
    buildsystem: meson
    config-opts:
      - -Dbuild-documentation=false
      - --libdir=lib
    sources:
      - type: archive
        url: https://download.gnome.org/sources/pangomm/2.46/pangomm-2.46.4.tar.xz
        sha256: b92016661526424de4b9377f1512f59781f41fb16c9c0267d6133ba1cd68db22

  - name: atkmm
    buildsystem: meson
    config-opts:
      - -Dbuild-documentation=false
      - --libdir=lib
    sources:
      - type: archive
        url: https://download.gnome.org/sources/atkmm/2.28/atkmm-2.28.4.tar.xz
        sha256: 0a142a8128f83c001efb8014ee463e9a766054ef84686af953135e04d28fdab3

  - name: gtkmm
    buildsystem: meson
    config-opts:
      - -Dbuild-examples=false
      - -Dbuild-documentation=false
      - -Dbuild-tests=false
      - --libdir=lib
    sources:
      - type: archive
        url: https://download.gnome.org/sources/gtkmm/3.24/gtkmm-3.24.9.tar.xz
        sha256: 30d5bfe404571ce566a8e938c8bac17576420eb508f1e257837da63f14ad44ce

  - name: omnissa-horizon-client
    buildsystem: simple
    sources:
      - type: file
        url: https://download3.omnissa.com/software/CART27FQ1_LIN64_RPMPKG_2603/Omnissa-Horizon-Client-2603-8.18.0-24120621798.x64.rpm
        sha256: dc20d7c516d40e23e20e5b2986115477c83150d9c465ba961c79b1de28d91b91
        dest-filename: horizon-client.rpm
      - type: file
        path: com.omnissa.HorizonClient.appdata.xml
    build-commands:
      - bsdtar xf horizon-client.rpm
      - chmod -R u+w .
      - cp -r usr/lib/* /app/lib/
      - cp -r usr/bin/* /app/bin/
      - cp -r usr/share/* /app/share/
      - mkdir -p "/app/share/icons/hicolor/64x64/apps/"
      - cp "/app/share/icons/horizon-client.png" "/app/share/icons/hicolor/64x64/apps/com.omnissa.HorizonClient.png"
      - mv "/app/share/applications/horizon-client-next.desktop" "/app/share/applications/com.omnissa.HorizonClient.desktop"
      - rm "/app/share/applications/horizon-client.desktop"
      - sed -i 's+Icon=/usr/share/icons/horizon-client.png+Icon=com.omnissa.HorizonClient+' "/app/share/applications/com.omnissa.HorizonClient.desktop"
      - sed -i 's+/usr+/app+g' "/app/bin/horizon-client-next"
      - sed -i 's+/usr+/app+g' "/app/bin/horizon-client"
      - sed -i 's+/usr+/app+g' "/app/bin/horizon-appstub"
      - sed -i 's+/usr+/app+g' "/app/bin/horizon-client-lib-scan"
      - sed -i 's+/usr+/app+g' "/app/bin/horizon-url-filter"
      - sed -i 's+/usr+/app+g' "/app/bin/horizon-client-log-collector"
      - sed -i 's+vm_append_to_library_path "$libpath"+vm_append_to_library_path "$libpath"\n   vm_append_to_library_path "/app/lib"+' "/app/bin/horizon-client-next"
      - for f in `find /app/lib/omnissa/ -not -type d`; do sed -i 's+/usr+/app+g' "$f"; done
      - cd /app/lib/ && ln -s libudev.so.1 libudev.so.0
      - mkdir -p /app/lib/omnissa/horizon/bin/horizon-client-next-bundle/
      - ln -s /app/lib/libclientSdkCPrimitive.so /app/lib/omnissa/horizon/bin/horizon-client-next-bundle/libclientSdkCPrimitive.so
      - ln -s /app/lib/libclientSdkCPrimitive.so /app/lib/omnissa/horizon/bin/horizon-client-next-bundle/clientSdkCPrimitive.so
      - install -Dm644 com.omnissa.HorizonClient.appdata.xml "${FLATPAK_DEST}/share/metainfo/${FLATPAK_ID}.appdata.xml"
