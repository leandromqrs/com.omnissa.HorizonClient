name: Build and Release Flatpak

on:
  push:
    tags:
      - '*'
  workflow_dispatch:

jobs:
  build:
    name: Build and Release
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Flatpak
        run: |
          sudo apt-get update
          sudo apt-get install -y flatpak flatpak-builder
          flatpak remote-add --user --if-not-exists flathub https://dl.flathub.org/repo/flathub.flatpakrepo

      - name: Build Flatpak
        run: |
          flatpak-builder --user --install-deps-from=flathub --repo=repo --force-clean build-dir com.omnissa.HorizonClient.yaml
          flatpak build-bundle repo com.omnissa.HorizonClient.flatpak com.omnissa.HorizonClient

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: com.omnissa.HorizonClient.flatpak
          path: com.omnissa.HorizonClient.flatpak

      - name: Create Release and Upload Asset
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: com.omnissa.HorizonClient.flatpak
          generate_release_notes: true
